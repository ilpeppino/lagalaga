services:
  backend:
    image: node:20-alpine
    container_name: lagalaga-backend
    working_dir: /app/backend
    volumes:
      - /data/apps/lagalaga:/app:rw
    env_file:
      - /data/apps/lagalaga/backend/.env
    environment:
      CI: "true"
      NODE_ENV: "production"
    command: >
      sh -lc "
      npm i -g pnpm@10.30.2 &&
      cd /app/backend &&
      pnpm install --prefer-offline &&
      pnpm build &&
      node dist/backend/src/server.js
      "
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: lagalaga-cloudflared
    user: "1000:1000"
    depends_on:
      - backend
    environment:
      HOME: /tmp
    command: tunnel --config /tmp/.cloudflared/config.yml run
    volumes:
      - /data/apps/lagalaga/_cloudflared:/tmp/.cloudflared
    restart: unless-stopped
