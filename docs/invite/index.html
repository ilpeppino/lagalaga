<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lagalaga Invite</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #101828;
        --muted: #475467;
        --accent: #1d4ed8;
        --border: #d0d5dd;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at top, #dbeafe 0%, var(--bg) 40%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 560px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px;
        box-shadow: 0 12px 28px rgba(16, 24, 40, 0.08);
      }
      h1 {
        font-size: 24px;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }
      .meta {
        margin-top: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 13px;
        color: #344054;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px;
        word-break: break-all;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      a.primary {
        background: var(--accent);
        color: #fff;
      }
      a.secondary {
        color: var(--accent);
        background: #fff;
      }
      .hint {
        margin-top: 12px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Opening your invite...</h1>
      <p id="status">If the app does not open automatically, use the button below.</p>
      <div class="meta" id="meta"></div>
      <div class="actions">
        <a id="open-app" class="button primary" href="#">Open in Lagalaga</a>
        <a class="button secondary" href="/lagalaga/">Open website</a>
      </div>
      <p class="hint">Tip: If this keeps opening in the browser, install/update Lagalaga and try again.</p>
    </main>

    <script>
      (function () {
        var url = new URL(window.location.href);
        var code = (url.searchParams.get('code') || '').trim();
        var meta = document.getElementById('meta');
        var status = document.getElementById('status');
        var openAppLink = document.getElementById('open-app');

        if (!code) {
          meta.textContent = 'Missing invite code in URL.';
          status.textContent = 'This invite link is invalid.';
          openAppLink.style.display = 'none';
          return;
        }

        var appUrl = 'lagalaga://invite/' + encodeURIComponent(code);
        openAppLink.href = appUrl;
        meta.textContent = 'Invite code: ' + code;

        // Attempt deep link automatically for browser contexts (WhatsApp, etc).
        window.location.replace(appUrl);
      })();
    </script>
  </body>
</html>
